<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Twidder</title>
    <link href="static/client.css" type="text/css" rel="stylesheet">
    
    <script src="static/client.js" type="text/javascript"></script>

    <script id="welcomeview" type="text/view">
        <div class="welcome-container">
            <div class="logo-section">
                <div class="brand-content">
                    <h1 class="brand-name">Twidder</h1>
                    <p class="brand-slogan">Socialize with</p>
                    <p class="brand-slogan right-align">other people</p> 
                    <p class="brand-slogan">around the world!</p>
                </div>
                <div class="brand-footer">
                    Http://www.ida.liu.se/~TDDD97
                </div>
            </div>
            <div class="form-section">
                <div class="login-box">
                    <form onsubmit="return handleSignIn(this);">
                        <label>Email</label> <input type="email" name="email" required>
                        <label>Password</label> <input type="password" name="password" minlength="6" required>
                        <button type="submit">Login</button>
                    </form>
                    <div id="login-feedback" class="feedback"></div>
                </div>
                <div class="signup-box">
                    <h3>Sign up here</h3>
                    <form onsubmit="return handleSignUp(this);">
                        <label>First name</label> <input type="text" name="firstname" required>
                        <label>Family name</label> <input type="text" name="familyname" required>
                        <label>Gender</label> 
                        <select name="gender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                        <label>City</label> <input type="text" name="city" required>
                        <label>Country</label> <input type="text" name="country" required>
                        <label>Email</label> <input type="email" name="email" required>
                        <label>Password</label> <input type="password" name="password" minlength="6" required>
                        <label>Repeat PSW</label> <input type="password" name="repeatPassword" required>
                        <button type="submit">SignUp</button>
                    </form>
                    <div id="signup-feedback" class="feedback"></div>
                </div>
            </div>
        </div>
    </script>

    <script id="profileview" type="text/view">
        <nav class="tabs">
            <button onclick="showTab('home')">Home</button>
            <button onclick="showTab('browse')">Browse</button>
            <button onclick="showTab('account')">Account</button>
        </nav>

        <div id="home" class="tab-content">
            <div id="user-info"></div>
            <div class="post-message">
                <textarea id="my-wall-message" placeholder="Write something..."></textarea>
                <button onclick="postToWall(null, 'my-wall-message')">Post</button>
                <button onclick="refreshMyWall()">Refresh Wall</button>
            </div>
            <div id="my-wall-messages"></div>
        </div>

        <div id="browse" class="tab-content" style="display:none;">
            <div class="search-user">
                <input type="email" id="search-email" placeholder="User email">
                <button onclick="searchUser()">Search</button>
            </div>
            <div id="search-feedback" class="feedback"></div>
            <div id="searched-profile" style="display:none;">
                <div id="searched-user-info"></div>
                <div class="post-message">
                    <textarea id="other-wall-message" placeholder="Write something..."></textarea>
                    <button onclick="postToOtherWall()">Post</button>
                    <button onclick="refreshOtherWall()">Refresh Wall</button>
                </div>
                <div id="searched-wall-messages"></div>
            </div>
        </div>

        <div id="account" class="tab-content" style="display:none;">
            <h3>Change Password</h3>
            <form onsubmit="return handleChangePassword(this);">
                <label>Old Password</label> <input type="password" name="oldPassword" required>
                <label>New Password</label> <input type="password" name="newPassword" minlength="6" required>
                <label>Repeat New Password</label> <input type="password" name="repeatNewPassword" required>
                <button type="submit">Change</button>
            </form>
            <div id="account-feedback" class="feedback"></div>
            <hr>
            <button onclick="handleSignOut()">Sign Out</button>
        </div>
    </script>
</head>
<body>
    <div id="main-content"></div>
</body>
</html>
